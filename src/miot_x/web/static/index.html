<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>miot-x</title>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div x-data="app()" x-init="init()" x-cloak>

    <!-- ===== LOGIN ===== -->
    <div x-show="!loggedIn" class="login-page">
        <div class="login-card">
            <div class="login-icon">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="1.5" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </div>
            <h1 class="login-title">智能家居</h1>
            <p class="login-subtitle">使用小米账号登录以控制你的设备</p>
            <button @click="startLogin()" :disabled="loginLoading" class="btn-login">
                <span x-show="!loginLoading">登录小米账号</span>
                <span x-show="loginLoading">等待授权...</span>
            </button>
            <div x-show="manualMode" class="manual-input">
                <input x-model="callbackUrl" type="text" placeholder="粘贴回调 URL..." class="input-field">
                <button @click="submitCallback()" class="btn-submit">提交</button>
            </div>
            <p x-show="loginError" x-text="loginError" class="login-error"></p>
        </div>
    </div>

    <!-- ===== MAIN APP ===== -->
    <div x-show="loggedIn" class="app-layout">

        <!-- Sidebar (Desktop) -->
        <aside class="sidebar">
            <div class="sidebar-brand">miot-x</div>
            <nav class="sidebar-nav">
                <a @click="navigate('home')" :class="tab==='home' && 'active'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                    <span>家庭</span>
                </a>
                <a @click="navigate('devices')" :class="tab==='devices' && 'active'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
                    <span>设备</span>
                </a>
                <a @click="navigate('scenes')" :class="tab==='scenes' && 'active'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                    <span>场景</span>
                </a>
                <a @click="navigate('settings')" :class="tab==='settings' && 'active'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span>设置</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- === HOME TAB === -->
            <section x-show="tab==='home' && !currentDevice">
                <h1 class="page-title">家庭</h1>
                <div class="room-tabs">
                    <button @click="roomFilter=''" :class="!roomFilter && 'active'" class="room-tab">全部</button>
                    <template x-for="room in rooms" :key="room">
                        <button @click="roomFilter=room" :class="roomFilter===room && 'active'" class="room-tab" x-text="room"></button>
                    </template>
                </div>
                <div class="tile-grid">
                    <template x-for="dev in filteredDevices" :key="dev.did">
                        <div class="device-tile" :class="dev.online ? deviceColor(dev) : 'tile-off'" @click="openDevice(dev)">
                            <div class="tile-header">
                                <span class="tile-icon" x-html="deviceIcon(dev)"></span>
                                <div x-show="isToggleable(dev)" @click.stop="quickToggle(dev)" class="tile-toggle" :class="dev._on && 'on'"></div>
                            </div>
                            <div class="tile-name" x-text="dev.name"></div>
                            <div class="tile-status" x-text="deviceStatus(dev)"></div>
                        </div>
                    </template>
                </div>
            </section>

            <!-- === DEVICES TAB === -->
            <section x-show="tab==='devices' && !currentDevice">
                <h1 class="page-title">设备</h1>
                <div class="room-tabs">
                    <button @click="typeFilter=''" :class="!typeFilter && 'active'" class="room-tab">全部</button>
                    <button @click="typeFilter='light'" :class="typeFilter==='light' && 'active'" class="room-tab">💡 灯光</button>
                    <button @click="typeFilter='climate'" :class="typeFilter==='climate' && 'active'" class="room-tab">🌡️ 温控</button>
                    <button @click="typeFilter='sensor'" :class="typeFilter==='sensor' && 'active'" class="room-tab">📊 传感器</button>
                    <button @click="typeFilter='switch'" :class="typeFilter==='switch' && 'active'" class="room-tab">🔌 开关</button>
                    <button @click="typeFilter='camera'" :class="typeFilter==='camera' && 'active'" class="room-tab">📷 摄像头</button>
                </div>
                <div class="device-list">
                    <template x-for="dev in typedDevices" :key="dev.did">
                        <div class="device-row" @click="openDevice(dev)">
                            <div class="row-icon" :class="deviceColor(dev)" x-html="deviceIcon(dev)"></div>
                            <div class="row-info">
                                <div class="row-name" x-text="dev.name"></div>
                                <div class="row-sub" x-text="(dev.room || '未分配') + ' · ' + (dev.online ? '在线' : '离线')"></div>
                            </div>
                            <div class="row-action" x-show="isToggleable(dev)" @click.stop="quickToggle(dev)">
                                <div class="mini-toggle" :class="dev._on && 'on'"></div>
                            </div>
                        </div>
                    </template>
                </div>
            </section>

            <!-- === SCENES TAB === -->
            <section x-show="tab==='scenes' && !currentDevice">
                <h1 class="page-title">场景</h1>
                <div class="scene-grid">
                    <template x-for="(scene, i) in scenes" :key="scene.scene_id">
                        <div class="scene-card" :class="'scene-color-' + (i % 6)" @click="runScene(scene.scene_id)">
                            <div class="scene-icon">⚡</div>
                            <div class="scene-name" x-text="scene.name"></div>
                        </div>
                    </template>
                </div>
                <p x-show="scenes.length===0" class="empty-hint">暂无场景</p>
            </section>

            <!-- === SETTINGS TAB === -->
            <section x-show="tab==='settings' && !currentDevice">
                <h1 class="page-title">设置</h1>
                <div class="settings-card">
                    <div class="settings-row">
                        <span>账号</span><span class="settings-value">已登录</span>
                    </div>
                    <div class="settings-row">
                        <span>设备数量</span><span class="settings-value" x-text="devices.length + ' 台'"></span>
                    </div>
                    <div class="settings-row">
                        <span>服务状态</span><span class="settings-value" style="color:#32BAC8">已连接</span>
                    </div>
                </div>
                <div class="settings-card" style="margin-top:12px">
                    <div class="settings-section-title">家庭选择</div>
                    <template x-for="home in homes" :key="home.home_id">
                        <label class="settings-check">
                            <input type="checkbox" :value="home.home_id" x-model="selectedHomes">
                            <span x-text="home.name"></span>
                            <span class="check-sub" x-text="home.room_count + '个房间'"></span>
                        </label>
                    </template>
                    <button @click="saveHomes()" class="btn-save">保存</button>
                </div>
                <div class="settings-card" style="margin-top:12px">
                    <button @click="logout()" class="btn-logout">退出登录</button>
                </div>
            </section>

            <!-- === DEVICE DETAIL === -->
            <section x-show="currentDevice">
                <div class="detail-header">
                    <button @click="currentDevice=null" class="btn-back">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
                        <span x-text="currentDevice?.name"></span>
                    </button>
                    <span class="detail-status" :class="currentDevice?.online && 'online'" x-text="currentDevice?.online ? '在线' : '离线'"></span>
                </div>

                <!-- Device-specific control panels -->
                <div class="detail-body" x-show="currentDevice">

                    <!-- Large status circle -->
                    <div class="status-hero" :class="deviceColor(currentDevice)">
                        <div class="hero-icon" x-html="deviceIcon(currentDevice, 48)"></div>
                        <div class="hero-label" x-text="deviceStatus(currentDevice)"></div>
                    </div>

                    <!-- ====== LIGHT TEMPLATE ====== -->
                    <div x-show="currentDevice && getDeviceType(currentDevice)==='light' && currentDevice.spec">
                        <div class="control-section">
                            <div class="section-label">灯光控制</div>
                            <div class="control-card">
                                <div class="control-row">
                                    <span class="control-name">开关</span>
                                    <div class="toggle-switch" :class="propValues['2-1'] && 'on'" @click="toggleProp(2,1)"><div class="toggle-knob"></div></div>
                                </div>
                                <div class="control-row" x-show="hasSpec(2,2)">
                                    <span class="control-name">亮度</span>
                                    <div class="slider-wrap">
                                        <input type="range" min="1" max="100" :value="propValues['2-2']||50" @change="setPropValue(2,2,Number($event.target.value))" class="range-slider">
                                        <span class="slider-val" x-text="(propValues['2-2']||'-')+'%'"></span>
                                    </div>
                                </div>
                                <div class="control-row" x-show="hasSpec(2,3)">
                                    <span class="control-name">色温</span>
                                    <div class="slider-wrap">
                                        <input type="range" min="2700" max="6500" :value="propValues['2-3']||4000" @change="setPropValue(2,3,Number($event.target.value))" class="range-slider slider-color-temp">
                                        <span class="slider-val" x-text="(propValues['2-3']||'-')+'K'"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ====== FAN TEMPLATE ====== -->
                    <div x-show="currentDevice && getDeviceType(currentDevice)==='fan' && currentDevice.spec">
                        <div class="control-section">
                            <div class="section-label">风扇控制</div>
                            <div class="control-card">
                                <div class="control-row">
                                    <span class="control-name">开关</span>
                                    <div class="toggle-switch" :class="propValues['2-1'] && 'on'" @click="toggleProp(2,1)"><div class="toggle-knob"></div></div>
                                </div>
                                <div class="control-row">
                                    <span class="control-name">档位</span>
                                    <div class="slider-wrap">
                                        <input type="range" min="1" max="4" step="1" :value="propValues['2-2']||1" @change="setPropValue(2,2,Number($event.target.value))" class="range-slider">
                                        <span class="slider-val" x-text="propValues['2-2']||'-'"></span>
                                    </div>
                                </div>
                                <div class="control-row">
                                    <span class="control-name">摆风</span>
                                    <div class="toggle-switch" :class="propValues['2-4'] && 'on'" @click="toggleProp(2,4)"><div class="toggle-knob"></div></div>
                                </div>
                                <div class="control-row">
                                    <span class="control-name">指示灯</span>
                                    <div class="toggle-switch" :class="propValues['4-1'] && 'on'" @click="toggleProp(4,1)"><div class="toggle-knob"></div></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ====== VACUUM TEMPLATE ====== -->
                    <div x-show="currentDevice && getDeviceType(currentDevice)==='vacuum' && currentDevice.spec">
                        <div class="control-section">
                            <div class="section-label">扫地机器人</div>
                            <div class="control-card">
                                <div class="control-row readonly">
                                    <span class="control-name">电量</span>
                                    <span class="control-value" x-text="(propValues['3-1']||'--')+'%'"></span>
                                </div>
                                <div class="control-row readonly">
                                    <span class="control-name">状态</span>
                                    <span class="control-value" x-text="propValues['2-1']||'--'"></span>
                                </div>
                                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px 20px;">
                                    <button class="btn-quick on" @click="execAction(2,1)">清扫</button>
                                    <button class="btn-quick off" @click="execAction(2,2)">停止</button>
                                    <button class="btn-quick off" @click="execAction(3,1)">回充</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ====== SPEAKER TEMPLATE ====== -->
                    <div x-show="currentDevice && getDeviceType(currentDevice)==='speaker' && currentDevice.spec">
                        <div class="control-section">
                            <div class="section-label">音箱控制</div>
                            <div class="control-card">
                                <div class="control-row">
                                    <span class="control-name">音量</span>
                                    <div class="slider-wrap">
                                        <input type="range" min="0" max="100" :value="propValues['2-1']||30" @change="setPropValue(2,1,Number($event.target.value))" class="range-slider">
                                        <span class="slider-val" x-text="(propValues['2-1']||'-')"></span>
                                    </div>
                                </div>
                                <div class="control-row">
                                    <span class="control-name">静音</span>
                                    <div class="toggle-switch" :class="propValues['2-2'] && 'on'" @click="toggleProp(2,2)"><div class="toggle-knob"></div></div>
                                </div>
                            </div>
                        </div>
                        <div class="control-section">
                            <div class="section-label">播放控制</div>
                            <div class="control-card">
                                <div class="playback-controls">
                                    <button class="pb-btn" @click="execAction(3,5)">⏮</button>
                                    <button class="pb-btn play" @click="execAction(3,2)">▶</button>
                                    <button class="pb-btn" @click="execAction(3,3)">⏸</button>
                                    <button class="pb-btn" @click="execAction(3,6)">⏭</button>
                                </div>
                            </div>
                        </div>
                        <div class="control-section">
                            <div class="section-label">语音指令</div>
                            <div class="control-card" x-data="{tts:''}">
                                <div style="display:flex;gap:8px;padding:14px 20px;">
                                    <input x-model="tts" type="text" placeholder="输入文本或指令..." class="num-input flex" style="text-align:left">
                                    <button @click="execTTS(tts)" class="btn-set">播报</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ====== TV Remote Control Template ====== -->
                    <div x-show="currentDevice && getDeviceType(currentDevice)==='tv' && currentDevice.spec">
                        <div class="control-section">
                            <div class="section-label">遥控器</div>
                            <div class="control-card tv-remote">
                                <div class="tv-row">
                                    <button class="tv-btn power on" @click="execAction(2,5)">开机</button>
                                    <button class="tv-btn power off" @click="execAction(2,6)">关机</button>
                                    <button class="tv-btn" @click="execAction(2,9)">信号源</button>
                                </div>
                                <div class="tv-row center">
                                    <button class="tv-btn round" @click="execAction(2,2)">CH+</button>
                                </div>
                                <div class="tv-row center">
                                    <button class="tv-btn round" @click="execAction(2,3)">VOL-</button>
                                    <div class="tv-ok">TV</div>
                                    <button class="tv-btn round" @click="execAction(2,4)">VOL+</button>
                                </div>
                                <div class="tv-row center">
                                    <button class="tv-btn round" @click="execAction(2,1)">CH-</button>
                                </div>
                                <div class="tv-row">
                                    <button class="tv-btn" @click="execAction(2,7)">静音</button>
                                    <button class="tv-btn" @click="execAction(2,8)">取消静音</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- SPEC-based controls -->
                    <template x-if="currentDevice?.spec">
                        <div>
                            <template x-for="service in currentDevice.spec.services" :key="service.iid">
                                <div class="control-section" x-show="service.properties.filter(p=>p.access&&(p.access.includes('write')||p.access.includes('read'))).length > 0">
                                    <div class="section-label" x-text="service.name"></div>
                                    <div class="control-card">
                                        <template x-for="prop in service.properties.filter(p=>p.access&&p.access.includes('write'))" :key="service.iid+'-'+prop.iid">
                                            <div class="control-row">
                                                <span class="control-name" x-text="prop.name"></span>
                                                <div class="control-widget">
                                                    <!-- Bool toggle -->
                                                    <template x-if="prop.format==='bool'">
                                                        <div class="toggle-switch" :class="propValues[service.iid+'-'+prop.iid] && 'on'" @click="toggleProp(service.iid, prop.iid)">
                                                            <div class="toggle-knob"></div>
                                                        </div>
                                                    </template>
                                                    <!-- Range slider -->
                                                    <template x-if="prop.format!=='bool' && prop.range">
                                                        <div class="slider-wrap">
                                                            <input type="range" :min="prop.range[0]" :max="prop.range[1]" :step="prop.range[2]||1"
                                                                   :value="propValues[service.iid+'-'+prop.iid]||0"
                                                                   @change="setPropValue(service.iid,prop.iid,Number($event.target.value))" class="range-slider">
                                                            <span class="slider-val" x-text="propValues[service.iid+'-'+prop.iid]??'-'"></span>
                                                        </div>
                                                    </template>
                                                    <!-- Value list -->
                                                    <template x-if="prop.value_list && prop.format!=='bool'">
                                                        <div class="chip-group">
                                                            <template x-for="v in prop.value_list" :key="v.value">
                                                                <button class="chip" :class="propValues[service.iid+'-'+prop.iid]==v.value && 'active'"
                                                                        @click="setPropValue(service.iid,prop.iid,v.value)" x-text="v.description"></button>
                                                            </template>
                                                        </div>
                                                    </template>
                                                    <!-- Number input -->
                                                    <template x-if="prop.format!=='bool' && !prop.range && !prop.value_list">
                                                        <div class="num-input-wrap">
                                                            <input type="number" class="num-input" :value="propValues[service.iid+'-'+prop.iid]"
                                                                   @keydown.enter="setPropValue(service.iid,prop.iid,Number($event.target.value))">
                                                            <button class="btn-set" @click="setPropValue(service.iid,prop.iid,Number($el.previousElementSibling.value))">设置</button>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                        <!-- Read-only props -->
                                        <template x-for="prop in service.properties.filter(p=>p.access&&!p.access.includes('write')&&p.access.includes('read'))" :key="'r'+service.iid+'-'+prop.iid">
                                            <div class="control-row readonly">
                                                <span class="control-name" x-text="prop.name"></span>
                                                <span class="control-value" x-text="propValues[service.iid+'-'+prop.iid]??'-'"></span>
                                            </div>
                                        </template>
                                        <!-- Actions -->
                                        <template x-for="action in (service.actions||[])" :key="'a'+service.iid+'-'+action.iid">
                                            <div class="control-row">
                                                <span class="control-name" x-text="action.name"></span>
                                                <button class="btn-action" @click="execAction(service.iid, action.iid)">执行</button>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Fallback: no SPEC -->
                    <div x-show="currentDevice && !currentDevice.spec && currentDevice.did">
                        <div class="control-section">
                            <div class="section-label">快捷控制</div>
                            <div class="control-card">
                                <div class="quick-buttons">
                                    <button @click="setPropValue(2,1,true)" class="btn-quick on">打开</button>
                                    <button @click="setPropValue(2,1,false)" class="btn-quick off">关闭</button>
                                </div>
                            </div>
                        </div>
                        <div class="control-section">
                            <div class="section-label">手动控制</div>
                            <div class="control-card" x-data="{s:2,p:1,v:'',rs:2,rp:1,rv:''}">
                                <div class="manual-row">
                                    <input x-model.number="s" type="number" placeholder="siid" class="num-input sm">
                                    <input x-model.number="p" type="number" placeholder="piid" class="num-input sm">
                                    <input x-model="v" type="text" placeholder="value" class="num-input flex">
                                    <button @click="let val=v==='true'?true:v==='false'?false:isNaN(v)?v:Number(v);$dispatch('set-prop',{siid:s,piid:p,value:val})" class="btn-set">设置</button>
                                </div>
                                <div class="manual-row" style="margin-top:8px">
                                    <input x-model.number="rs" type="number" placeholder="siid" class="num-input sm">
                                    <input x-model.number="rp" type="number" placeholder="piid" class="num-input sm">
                                    <button @click="fetch(`/api/devices/${currentDevice.did}/prop/${rs}/${rp}`).then(r=>r.json()).then(d=>rv=JSON.stringify(d.value))" class="btn-set secondary">读取</button>
                                    <span class="read-result" x-text="rv||'-'"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </section>
        </main>

        <!-- Bottom Tab Bar (Mobile) -->
        <nav class="tab-bar">
            <button @click="navigate('home')" :class="tab==='home' && 'active'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span>家庭</span>
            </button>
            <button @click="navigate('devices')" :class="tab==='devices' && 'active'">
